<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SiteMind AI – тестовый прототип</title>
    <style>
        /* Базовые стили страницы */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            padding-bottom: 100px;
        }
        .product-card {
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            transition: box-shadow 0.3s, border-color 0.3s;
        }
        .product-card.highlight {
            border-color: #007bff;
            box-shadow: 0 0 20px rgba(0,123,255,0.4);
        }
        .specs {
            margin-top: 15px;
            color: #333;
        }
        .contacts-block {
            background: #fff;
            padding: 20px;
            margin-top: 50px;
            border: 1px solid #ccc;
        }
        .modal {
            display: none;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, 0);
            background: white;
            padding: 30px;
            border: 1px solid #333;
            z-index: 1000;
        }
        .modal.active {
            display: block;
        }

        /* Виджет чата */
        #chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            max-height: 500px;
            z-index: 999;
        }
        #chat-header {
            background: #007bff;
            color: white;
            padding: 12px;
            border-radius: 12px 12px 0 0;
            font-weight: bold;
            cursor: pointer;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            min-height: 200px;
            max-height: 300px;
        }
        .msg {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
        }
        .msg.user {
            background: #e9f5ff;
            text-align: right;
        }
        .msg.bot {
            background: #f1f1f1;
        }
        #chat-input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }
        #chat-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 0 0 0 12px;
            outline: none;
        }
        #chat-send {
            padding: 12px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 0 0 12px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Магазин электроники (демо-сайт)</h1>

    <!-- Карточка товара -->
    <div class="product-card" id="product-iphone">
        <h2>iPhone 15 Pro</h2>
        <div class="specs">
            <p><strong>Характеристики:</strong> A17 Pro, 6.1", 256 ГБ</p>
            <p><strong>Цена:</strong> 129 990 ₽</p>
        </div>
    </div>

    <div class="product-card">
        <h2>MacBook Air M3</h2>
        <div class="specs">
            <p><strong>Характеристики:</strong> M3, 8 ГБ ОЗУ, 512 ГБ SSD</p>
            <p><strong>Цена:</strong> 159 990 ₽</p>
        </div>
    </div>

    <!-- Контакты -->
    <div id="contacts" class="contacts-block">
        <h3>Наши контакты</h3>
        <p>Телефон: +7 999 123-45-67</p>
    </div>

    <!-- Модальное окно -->
    <div id="contact-modal" class="modal">
        <h3>Форма обратной связи</h3>
        <input type="text" placeholder="Ваше имя"><br><br>
        <input type="email" placeholder="Email"><br><br>
        <button onclick="document.getElementById('contact-modal').classList.remove('active')">Закрыть</button>
    </div>

    <!-- Виджет чата -->
    <div id="chat-widget">
        <div id="chat-header" onclick="toggleChat()">💬 SiteMind AI (тест)</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Спросите меня..." onkeypress="handleKey(event)">
            <button id="chat-send" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        // ---------- Логика виджета ----------
        const wsUrl = `ws://localhost:8000/ws/test-user-123`;  // фиксированный client_id
        let socket = null;
        let messagesDiv = document.getElementById('chat-messages');

        function connectWebSocket() {
            socket = new WebSocket(wsUrl);
            socket.onopen = () => addMessage('bot', '✅ Соединение установлено. Чем помочь?');
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                // Показываем текстовый ответ
                if (data.message) {
                    addMessage('bot', data.message);
                }
                // Выполняем UI-команды
                if (data.commands && data.commands.length > 0) {
                    data.commands.forEach(cmd => executeCommand(cmd));
                }
            };
            socket.onclose = () => addMessage('bot', '⛔ Соединение закрыто');
            socket.onerror = () => addMessage('bot', '❌ Ошибка соединения');
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                addMessage('bot', 'Нет соединения с сервером. Перезагрузите страницу.');
                return;
            }
            // Выводим сообщение пользователя
            addMessage('user', text);
            // Отправляем на сервер
            socket.send(JSON.stringify({ text: text }));
            input.value = '';
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // ---------- Исполнение UI-команд ----------
        function executeCommand(cmd) {
            switch (cmd.action) {
                case 'highlight':
                    const el = document.querySelector(cmd.selector);
                    if (el) {
                        el.classList.add('highlight');
                        setTimeout(() => el.classList.remove('highlight'), cmd.duration || 2000);
                    }
                    break;
                case 'scrollTo':
                    const target = document.querySelector(cmd.selector);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    break;
                case 'openModal':
                    const modal = document.querySelector(cmd.selector);
                    if (modal) modal.classList.add('active');
                    break;
                // Другие действия можно добавить здесь
                default:
                    console.log('Неизвестная команда:', cmd);
            }
        }

        // Сворачивание/разворачивание чата (просто для вида)
        function toggleChat() {
            const messages = document.getElementById('chat-messages');
            const inputArea = document.getElementById('chat-input-area');
            if (messages.style.display === 'none') {
                messages.style.display = 'block';
                inputArea.style.display = 'flex';
            } else {
                messages.style.display = 'none';
                inputArea.style.display = 'none';
            }
        }

        // Запускаем WebSocket при загрузке страницы
        window.onload = connectWebSocket;
    </script>
</body>
</html>
